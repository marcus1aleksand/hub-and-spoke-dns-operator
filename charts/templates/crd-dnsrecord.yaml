{{- if .Values.gitops.crd.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: dnsrecords.dns.example.com
spec:
  group: dns.example.com
  names:
    kind: DNSRecord
    listKind: DNSRecordList
    plural: dnsrecords
    singular: dnsrecord
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - recordType
                - value
              properties:
                recordType:
                  type: string
                  enum: [A, AAAA, CNAME, TXT, MX]
                value:
                  type: string
                ttl:
                  type: integer
                  default: 300
                priority:
                  type: integer
                labels:
                  type: object
                  additionalProperties:
                    type: string
            status:
              type: object
              properties:
                conditions:
                  type: array
                  items:
                    type: object
                lastUpdated:
                  type: string
                message:
                  type: string
{{- end }}
